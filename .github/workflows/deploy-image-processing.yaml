name: Deploy Image Processing Infrastructure

on:
  push:
    branches: [main, staging, dev]
    paths:
      - "image-processing/**"
      - "services/image-service/**"
      - ".github/workflows/deploy-image-processing.yaml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.set-stage.outputs.stage }}
      db_stage: ${{ steps.set-stage.outputs.db_stage }}
    steps:
      - name: Set deployment stage
        id: set-stage
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            STAGE="${{ github.event.inputs.stage }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            STAGE="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            STAGE="staging"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            STAGE="dev"
          else
            STAGE="dev"
          fi

          # Map deployment stage -> data-namespace (DB_STAGE): dev->staging, staging->prod, prod->prod.
          # Image S3 buckets, the processing table, and the resizer all live in the DB_STAGE
          # namespace, so staging fully shares prod image infra and dev shares the staging namespace.
          case "$STAGE" in
            dev)     DB_STAGE="staging" ;;
            staging) DB_STAGE="prod" ;;
            prod)    DB_STAGE="prod" ;;
            *)       DB_STAGE="$STAGE" ;;
          esac

          echo "stage=$STAGE" >> $GITHUB_OUTPUT
          echo "db_stage=$DB_STAGE" >> $GITHUB_OUTPUT
          echo "Resolved deployment stage=$STAGE -> data namespace (DB_STAGE)=$DB_STAGE"

  deploy-image-processing-infrastructure:
    needs: set-environment
    runs-on: ubuntu-latest
    # The resizer is owned by the data-namespace owner: prod owns the 'prod' namespace,
    # dev owns the 'staging' namespace. A 'staging' deployment borrows the existing prod
    # resizer (DB_STAGE=prod) and must NOT redeploy it, so skip the resizer deploy for staging.
    if: needs.set-environment.outputs.stage != 'staging'
    env:
      STAGE: ${{ needs.set-environment.outputs.stage }}
      DB_STAGE: ${{ needs.set-environment.outputs.db_stage }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Package Image Processing Lambda
        run: |
          echo "📦 Packaging image processing Lambda for stage: ${STAGE}"

          cd image-processing

          # Install dependencies
          npm install --production

          # Create deployment package
          PACKAGE_NAME="image-processing-${STAGE}-$(date +%s).zip"
          zip -r "../${PACKAGE_NAME}" . -x "*.git*" "node_modules/.cache/*" "*.md"

          cd ..

          # Upload to S3
          S3_BUCKET="truss-api-automated-deployments"
          S3_KEY="lambda-packages/${PACKAGE_NAME}"

          echo "☁️  Uploading package to S3: s3://${S3_BUCKET}/${S3_KEY}"
          aws s3 cp "${PACKAGE_NAME}" "s3://${S3_BUCKET}/${S3_KEY}"

          # Store package info for deployment
          echo "S3_BUCKET=${S3_BUCKET}" >> $GITHUB_ENV
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV

          # Clean up local package
          rm "${PACKAGE_NAME}"

          echo "✅ Image processing Lambda packaged and uploaded"

      - name: Deploy Image Processing Lambda
        run: |
          echo "🚀 Deploying image processing Lambda for stage: ${STAGE}"

          # All image infra (buckets, table, resizer) lives in the DB_STAGE data-namespace,
          # so staging shares prod and dev shares the staging namespace. DB_STAGE is resolved
          # once in set-environment. The resizer stack/function are keyed by DB_STAGE so prod and
          # staging converge on a single 'prod' resizer (staging is gated out above) and there is
          # no per-deploy notification clobbering.
          STACK_NAME="truss-image-processing-${DB_STAGE}"
          FUNCTION_NAME="truss-image-processing-${DB_STAGE}"
          SOURCE_BUCKET="truss-annotation-image-source-${DB_STAGE}"
          PROCESSED_BUCKET="truss-annotation-image-processed-${DB_STAGE}"
          PROCESSING_TABLE="truss-image-processing-${DB_STAGE}"

          echo "📊 Deploy stage=${STAGE} -> data namespace=${DB_STAGE}"
          echo "   stack=${STACK_NAME} source=${SOURCE_BUCKET} processed=${PROCESSED_BUCKET} table=${PROCESSING_TABLE}"

          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file image-processing/template.yaml \
            --parameter-overrides \
              StageName=${DB_STAGE} \
              FunctionName=${FUNCTION_NAME} \
              CodeS3Bucket=${S3_BUCKET} \
              CodeS3Key=${S3_KEY} \
              SourceBucketName=${SOURCE_BUCKET} \
              ProcessedBucketName=${PROCESSED_BUCKET} \
              ProcessingTableName=${PROCESSING_TABLE} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "✅ Image processing Lambda deployed successfully"

      - name: Get Lambda Outputs
        id: get-outputs
        run: |
          echo "🔍 Getting Lambda outputs..."

          STACK_NAME="truss-image-processing-${DB_STAGE}"
          SOURCE_BUCKET="truss-annotation-image-source-${DB_STAGE}"
          PROCESSED_BUCKET="truss-annotation-image-processed-${DB_STAGE}"

          PROCESSING_TABLE=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='ProcessingTableName'].OutputValue" \
            --output text)

          LAMBDA_FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionArn'].OutputValue" \
            --output text)

          echo "source_bucket=${SOURCE_BUCKET}" >> $GITHUB_OUTPUT
          echo "processed_bucket=${PROCESSED_BUCKET}" >> $GITHUB_OUTPUT
          echo "processing_table=${PROCESSING_TABLE}" >> $GITHUB_OUTPUT
          echo "lambda_function_arn=${LAMBDA_FUNCTION_ARN}" >> $GITHUB_OUTPUT

          echo "✅ Lambda outputs retrieved:"
          echo "   Source Bucket: ${SOURCE_BUCKET}"
          echo "   Processed Bucket: ${PROCESSED_BUCKET}"
          echo "   Processing Table: ${PROCESSING_TABLE}"
          echo "   Lambda Function ARN: ${LAMBDA_FUNCTION_ARN}"

  configure-s3-notifications:
    needs: [set-environment, deploy-image-processing-infrastructure]
    runs-on: ubuntu-latest
    # Skip for staging — it borrows the prod resizer and must not re-point prod's source-bucket
    # notification (see the gate on deploy-image-processing-infrastructure).
    if: needs.set-environment.outputs.stage != 'staging'
    env:
      STAGE: ${{ needs.set-environment.outputs.stage }}
      DB_STAGE: ${{ needs.set-environment.outputs.db_stage }}
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Configure S3 bucket notifications
        run: |
          echo "🔧 Configuring S3 bucket notifications for image processing..."

          # Get Lambda function ARN (resizer is keyed by the DB_STAGE data-namespace)
          LAMBDA_ARN=$(aws lambda get-function --function-name "truss-image-processing-${DB_STAGE}" --query 'Configuration.FunctionArn' --output text)

          # Configure S3 bucket notification to trigger Lambda on image upload
          # Only trigger on files in uploads/ prefix to avoid processing other files
          aws s3api put-bucket-notification-configuration \
            --bucket "truss-annotation-image-source-${DB_STAGE}" \
            --notification-configuration '{
              "LambdaFunctionConfigurations": [
                {
                  "Id": "ImageProcessingTrigger",
                  "LambdaFunctionArn": "'${LAMBDA_ARN}'",
                  "Events": ["s3:ObjectCreated:*"],
                  "Filter": {
                    "Key": {
                      "FilterRules": [
                        {
                          "Name": "prefix",
                          "Value": "uploads/"
                        }
                      ]
                    }
                  }
                }
              ]
            }'

          echo "✅ S3 bucket notifications configured successfully"

  deployment-summary:
    needs:
      [
        set-environment,
        deploy-image-processing-infrastructure,
        configure-s3-notifications,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "🎉 Image Processing Lambda Deployment Complete!"
          echo "════════════════════════════════════════════════════════════════"
          echo "📍 Stage: ${{ needs.set-environment.outputs.stage }}"
          echo ""
          echo "📊 Deployment Summary:"
          echo "   - Source S3 Bucket: ${{ needs.deploy-image-processing-infrastructure.outputs.source_bucket }}"
          echo "   - Processed S3 Bucket: ${{ needs.deploy-image-processing-infrastructure.outputs.processed_bucket }}"
          echo "   - Processing Table: ${{ needs.deploy-image-processing-infrastructure.outputs.processing_table }}"
          echo "   - Lambda Function: truss-image-processing-${{ needs.set-environment.outputs.db_stage }} (data namespace for deploy stage ${{ needs.set-environment.outputs.stage }})"
          echo ""
          echo "🚀 Image Processing Workflow:"
          echo "   1. Upload image to S3 source bucket"
          echo "   2. S3 event triggers image processing Lambda"
          echo "   3. Processed images stored in processed bucket"
          echo ""
          echo "📝 Next Steps:"
          echo "   - Deploy image service using: Deploy Services workflow"
          echo "   - Update API Gateway using: Deploy API Gateway workflow"
          echo ""
          echo "✅ Lambda and DynamoDB deployed successfully!"

  notify-deployment:
    needs:
      [
        set-environment,
        deploy-image-processing-infrastructure,
        configure-s3-notifications,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.deploy-image-processing-infrastructure.result }}" == "success" && "${{ needs.configure-s3-notifications.result }}" == "success" ]]; then
            echo "✅ Image Processing Infrastructure deployment successful for stage: ${{ needs.set-environment.outputs.stage }}"
          else
            echo "❌ Image Processing Infrastructure deployment failed for stage: ${{ needs.set-environment.outputs.stage }}"
            echo "Infrastructure: ${{ needs.deploy-image-processing-infrastructure.result }}"
            echo "S3 Notifications: ${{ needs.configure-s3-notifications.result }}"
            exit 1
          fi
